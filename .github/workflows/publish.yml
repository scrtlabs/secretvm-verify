name: Publish to npm and PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.10.0). npm only; PyPI is skipped on manual runs."
        required: true

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    # OIDC trusted publishing: id-token mints a short-lived credential per run,
    # replacing the long-lived NPM_TOKEN secret. Configure the trusted publisher
    # for this package on npmjs.com (repo scrtlabs/secretvm-verify, workflow
    # publish.yml, no environment).
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # No registry-url: it makes setup-node write an .npmrc with a
          # placeholder _authToken, which forces (failing) token auth and
          # blocks the OIDC trusted-publishing exchange. npm defaults to
          # registry.npmjs.org and uses OIDC when no token is present.

      - name: Upgrade npm for OIDC trusted publishing
        # The Node 20 runner ships npm 10.x; OIDC trusted publishing needs >= 11.5.1.
        run: npm install -g npm@latest

      - run: npm ci

      - name: Sync artifact registry data
        run: |
          cp ../artifacts_registry/tdx.csv data/tdx.csv
          cp ../artifacts_registry/sev.json data/sev.json

      - name: Set version
        run: npm version "${{ github.event.release.tag_name || inputs.version }}" --no-git-tag-version --allow-same-version

      - run: npm run build

      - name: Publish to npm (OIDC trusted publishing)
        # setup-node points NPM_CONFIG_USERCONFIG at a temp .npmrc that carries a
        # stale `_auth`. Any credential makes npm skip the OIDC exchange (then
        # fail ENEEDAUTH), so publish against a clean userconfig with no auth.
        env:
          NPM_CONFIG_USERCONFIG: ${{ runner.temp }}/npmrc-clean
        run: |
          printf 'registry=https://registry.npmjs.org/\nprovenance=true\n' > "$NPM_CONFIG_USERCONFIG"
          npm publish --access public

  publish-pypi:
    # Only on real releases. Manual workflow_dispatch runs publish npm only
    # (PyPI rejects re-uploading an existing version).
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install build twine

      - name: Sync artifact registry data
        run: |
          cp ../artifacts_registry/tdx.csv src/secretvm/verify/data/tdx.csv
          cp ../artifacts_registry/sev.json src/secretvm/verify/data/sev.json

      - name: Set version from tag
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml

      - run: python -m build

      - run: python -m twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
